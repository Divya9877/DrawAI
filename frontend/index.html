<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        DrawAI Studio
    </title>

    <link
        rel="stylesheet"
        href="css/main.css"
    >

</head>

<body>

    <!-- =========================================
         MAIN CONTAINER
    ========================================== -->

    <div class="app-container">
        <div class="sidebar">

<div class="profile-card">

    <h3 id="profileName">
        User
    </h3>

    <p id="profileEmail">
        user@email.com
    </p>
      <button
        onclick="logout()"
    >
        Logout
    </button>

</div>

    <button
        class="new-chat-btn"
        onclick="newChat()"
    >
        ➕ New Chat
    </button>

    <div id="chatHistory">

    </div>

</div>

        <!-- =====================================
             LEFT PANEL
        ====================================== -->

        <div class="left-panel">

            <div class="logo-area">

                <h1>
                    DrawAI Studio
                </h1>

                <p>
                    Intelligent Sketch Learning System
                </p>

            </div>

            <!-- =================================
                 TOOLBAR
            ================================== -->

            <div class="toolbar">

                <button

                    class="tool-btn active"

                    onclick="setPencil()"

                >

                    Pencil

                </button>

                <button

                    class="tool-btn"

                    onclick="setEraser()"

                >

                    Eraser

                </button>

                <button

                    class="tool-btn danger"

                    onclick="clearBoard()"

                >

                    Clear

                </button>

            </div>

            <!-- =================================
                 DRAWING AREA
            ================================== -->

            <div class="canvas-wrapper">

                <canvas
                    id="drawingCanvas"
                ></canvas>

            </div>

            <!-- =================================
                 ACTION BUTTONS
            ================================== -->

            <div class="action-buttons">

                <button

                    class="main-btn"

                    onclick="predictDrawing()"

                >

                    Predict

                </button>

<button

    class="main-btn secondary"

    onclick="openFlashcards()"

>

    Flashcards
</button>

                <button

                    class="main-btn secondary"

                    onclick="open3D()"

                >

                    Generate 3D

                </button>

                <button

                    class="main-btn"

                    onclick="speakExplanation()"

                >

                    Speak

                </button>

                <button
    class="main-btn danger"
    onclick="stopSpeaking()"
>
    Stop
</button>

           <button

    class="main-btn secondary"
    onclick="openDashboard()"
>

    Dashboard

</button>

            </div>

            <!-- =================================
                 IMAGE UPLOAD
            ================================== -->

            <div class="upload-area">

                <input

                    type="file"

                    id="uploadInput"

                    accept="image/*"

                >

            </div>

        </div>

        <!-- =====================================
             RIGHT PANEL
        ====================================== -->

<div class="right-panel">

    <!-- PREDICTION -->

    <div class="prediction-card">

        <h2>
            Prediction
        </h2>

        <div id="predictionBox">

            Draw something and click Predict.

        </div>

    </div>

    <!-- CHAT -->

    <div class="chat-card">

        <h2>
            AI Assistant
        </h2>

        <div id="chatMessages">

        </div>

        <div class="chat-input-area">

            <input

                type="text"

                id="chatInput"

                placeholder="Ask AI something..."

            >

            <button

                onclick="startVoiceChat()"

                title="Voice Chat"

            >

                🎤

            </button>

            <button

                onclick="sendMessage()"

            >

                Send

            </button>

        </div>

    </div>

</div>
    </div>

    <!-- =========================================
         SCRIPT
    ========================================== -->

    <script src="js/app.js"></script>

</body>

</html>
